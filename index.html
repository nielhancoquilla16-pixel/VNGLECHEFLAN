<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta Tags -->
    <title>V &amp; G LecheFlan - Dessert Shop Management System</title>
    <meta name="title" content="V &amp; G LecheFlan - Dessert Shop Management System" />
    <meta name="description" content="Complete dessert shop sales and management system with online ordering, inventory management, POS transactions, and delivery management" />
    <meta name="keywords" content="leche flan, dessert shop, online ordering, POS system, inventory management, food delivery" />
    <meta name="author" content="V &amp; G LecheFlan" />

    <!-- Theme Color (supported in Chrome, Edge, Safari; gracefully ignored by Firefox, Opera) -->
    <meta name="theme-color" content="#FBBF24" />
    <meta name="msapplication-TileColor" content="#FBBF24" />
    <meta name="msapplication-navbutton-color" content="#FBBF24" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="V&G LecheFlan" />
    <meta name="application-name" content="V&G LecheFlan" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon.svg" />
    <link rel="shortcut icon" href="/icon.svg" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icon.svg" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vglecheflan.com/" />
    <meta property="og:title" content="V &amp; G LecheFlan - Dessert Shop Management System" />
    <meta property="og:description" content="Complete dessert shop sales and management system" />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://vglecheflan.com/" />
    <meta property="twitter:title" content="V &amp; G LecheFlan - Dessert Shop Management System" />
    <meta property="twitter:description" content="Complete dessert shop sales and management system" />
    <meta property="twitter:image" content="/icons/icon-512x512.png" />

    <!-- Disable Automatic Phone Number Detection -->
    <meta name="format-detection" content="telephone=no" />

    <!-- iOS Safari -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- Splash Screens for iOS -->
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" />

    <style>
      /* Prevent flash of unstyled content */
      html {
        background-color: #FBBF24;
      }

      /* Loading animation */
      .app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: linear-gradient(135deg, #FBBF24 0%, #F59E0B 100%);
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Safe area for notched devices */
      body {
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-loading">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- correct, root‑relative path -->
    <script type="module" src="/src/main.jsx"></script>

    <noscript>
      <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
        <h1>JavaScript Required</h1>
        <p>Please enable JavaScript in your browser to use V &amp; G LecheFlan.</p>
      </div>
    </noscript>

    <!-- display uncaught errors so we can see why the app failed -->
    <script>
      function showError(message) {
        const root = document.getElementById('root');
        if (!root) return;
        root.innerHTML = `<pre style="color:red; padding:20px; white-space:pre-wrap;">${message}</pre>`;
      }
      window.addEventListener('error', (e) => {
        console.error('global error', e.error || e.message);
        showError('Error: ' + (e.error?.message || e.message));
      });
      window.addEventListener('unhandledrejection', (e) => {
        console.error('unhandled rejection', e.reason);
        showError('Unhandled rejection: ' + (e.reason?.message || e.reason));
      });
    </script>
  </body>
</html>
